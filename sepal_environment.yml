name: sdg_15.3.1
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - sepal-ui
  - pyproj  # Always include to avoid PROJ conflicts
  - setuptools<=80
  - wheel
  - pre-commit
  - gdal=3.8.3
  - pandas=2.2.3
  - matplotlib
  - numpy
  - geopandas=1.0.1
  - natsort
  - rasterio<=1.4.3
  - pip
  - pip:
    - git+https://github.com/openforis/earthengine-api.git@v1.6.14#egg=earthengine-api&subdirectory=python
    - plotly>=5.2.2,<6.0
    - ee-extra<2025.7.2
